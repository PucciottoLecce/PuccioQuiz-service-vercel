<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PuccioQuiz — Fine</title>
  <style>
    :root{
      --bg:#070707;
      --card:#0f0f10;
      --accent-red:#ff3b3b;
      --sage:#9caf88;
      --muted:#bfc8bf;
      --radius:14px;
      --shadow:0 18px 60px rgba(0,0,0,0.7);
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    html,body{
      min-height:100vh;
      margin:0;
      background:
        radial-gradient(800px 400px at 10% 10%, rgba(156,175,136,0.05), transparent 8%),
        radial-gradient(700px 350px at 90% 90%, rgba(255,59,59,0.04), transparent 8%),
        linear-gradient(180deg,var(--bg),#040404);
      color:#eef2ea;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      box-sizing:border-box;
    }
    .card{
      width:min(680px, 100%);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius: calc(var(--radius) + 6px);
      box-shadow: var(--shadow);
      padding:26px;
      border:1px solid rgba(255,255,255,0.03);
      text-align:center;
    }
    h1{
      margin:0 0 10px 0;
      font-size:24px;
      letter-spacing:-0.4px;
      font-weight:900;
      background: linear-gradient(90deg, #ffd9d9, var(--accent-red), var(--sage));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    p{
      margin:0;
      color:var(--muted);
      line-height:1.5;
      font-size:14px;
    }
    .actions{
      margin-top:18px;
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
    }
    button{
      background: linear-gradient(90deg, var(--accent-red), #b22222);
      color:#fff;
      border:none;
      padding:12px 16px;
      border-radius:12px;
      font-weight:800;
      cursor:pointer;
      box-shadow: 0 12px 36px rgba(255,59,59,0.18);
    }
    button.secondary{
      background: transparent;
      color: #eaf2ea;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:none;
    }
    .small{
      margin-top:10px;
      font-size:12px;
      color:rgba(191,200,191,0.85);
    }
  </style>
</head>
<body>
  <div class="card" role="main" aria-label="Fine gioco">
    <h1>Grazie per aver giocato</h1>
    <p>Il gioco è terminato. Se questa pagina non si chiude automaticamente, puoi uscire con il pulsante qui sotto.</p>

    <div class="actions">
      <button id="closeBtn" type="button">Chiudi</button>
      <button id="backBtn" class="secondary" type="button">Torna all'inizio</button>
    </div>
    <div class="small" id="hint"></div>
  </div>

  <script>
    (function(){
      function getExitFromQuery(){
        const params = new URLSearchParams(window.location.search);
        const v = params.get('exit');
        try {
          return v ? decodeURIComponent(v) : 'about:blank';
        } catch(_) {
          return 'about:blank';
        }
      }

      const exitUrl = getExitFromQuery();
      const hint = document.getElementById('hint');
      hint.textContent = exitUrl && exitUrl !== 'about:blank'
        ? ('Uscita impostata: ' + exitUrl)
        : "Uscita impostata: chiusura/blank";

      function attemptClose(){
        try { window.close(); } catch(_) {}
        // fallback: se non si chiude, naviga verso exitUrl (se diverso da blank) o a blank
        setTimeout(() => { window.location.href = exitUrl || 'about:blank'; }, 250);
      }

      document.getElementById('closeBtn').addEventListener('click', attemptClose);
      document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = 'test.html';
      });

      // Auto-uscita dopo 3 secondi (se la chiusura è permessa chiude, altrimenti naviga fuori)
      setTimeout(attemptClose, 3000);
    })();
  </script>
</body>
</html>
